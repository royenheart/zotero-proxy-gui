name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Minimal permissions — only write to releases
permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Verify tag matches package.json version ────────────────────────────
      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version : $PKG_VERSION"
          echo "Git tag version      : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi

      # ── TypeScript type check ──────────────────────────────────────────────
      - name: Type check
        run: npm run typecheck

      # ── Build both plugin versions ─────────────────────────────────────────
      - name: Build Zotero 7 plugin
        run: npm run build:v7

      - name: Build Zotero 8 plugin
        run: npm run build:v8

      # ── Collect artefacts ──────────────────────────────────────────────────
      - name: List build artefacts
        run: ls -lh build/v7/*.xpi build/v8/*.xpi

      # ── Extract changelog section for this release ─────────────────────────
      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            # Extract the block between ## [VERSION] and the next ## heading
            NOTES=$(awk "/^## \[?v?${VERSION}\]?/{flag=1; next} flag && /^## /{flag=0} flag{print}" CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # Write to a file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      # ── Create GitHub Release and upload XPIs ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Zotero Proxy GUI ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            build/v7/zotero-proxy-gui-v7.xpi
            build/v8/zotero-proxy-gui-v8.xpi
