<linkset>
  <html:link rel="localization" href="zotero-proxy-gui-preferences.ftl" />
</linkset>

<html:div class="proxy-pane">

  <!-- Current Status -->
  <html:div class="status-bar" id="status-bar">
    <html:div class="status-dot" id="status-dot"/>
    <html:span class="status-label" id="status-label" data-l10n-id="proxy-status-none"/>
  </html:div>

  <!-- Configuration List -->
  <html:div class="config-list-header">
    <html:h3 data-l10n-id="proxy-configs-title"/>
  </html:div>
  <html:div class="config-list" id="config-list">
    <html:div class="config-empty" id="config-empty" data-l10n-id="proxy-configs-empty"/>
  </html:div>

  <!-- Action Buttons -->
  <html:div class="btn-row">
    <html:button class="primary" id="btn-add" data-l10n-id="proxy-btn-add"/>
    <html:button id="btn-edit" disabled="true" data-l10n-id="proxy-btn-edit"/>
    <html:button class="danger" id="btn-delete" disabled="true" data-l10n-id="proxy-btn-delete"/>
    <html:button id="btn-activate" disabled="true" data-l10n-id="proxy-btn-activate"/>
    <html:button id="btn-disable" data-l10n-id="proxy-btn-disable"/>
  </html:div>

</html:div>

<!-- Add/Edit Dialog -->
<html:div class="dialog-backdrop" id="dialog-backdrop">
  <html:div class="dialog-box">
    <html:h3 id="dialog-title" data-l10n-id="proxy-dialog-add-title"/>

    <html:div class="error-msg" id="dialog-error"/>

    <html:div class="field-row">
      <html:label for="field-name" data-l10n-id="proxy-field-name"/>
      <html:input type="text" id="field-name"/>
    </html:div>

    <html:div class="field-row">
      <html:label for="field-type" data-l10n-id="proxy-field-type"/>
      <html:select id="field-type">
        <html:option value="http" data-l10n-id="proxy-type-http"/>
        <html:option value="socks5" data-l10n-id="proxy-type-socks5"/>
      </html:select>
    </html:div>

    <html:div class="field-row">
      <html:label data-l10n-id="proxy-field-host-port"/>
      <html:div class="field-group">
        <html:input type="text" id="field-host" placeholder="192.168.1.100"/>
        <html:input type="number" id="field-port" placeholder="7890" min="1" max="65535"/>
      </html:div>
    </html:div>

    <!-- HTTP: SSL/HTTPS fields -->
    <html:div class="ssl-section" id="ssl-section">
      <html:div class="field-row">
        <html:label data-l10n-id="proxy-field-ssl-host-port"/>
        <html:div class="field-group">
          <html:input type="text" id="field-ssl-host" placeholder="192.168.1.100"/>
          <html:input type="number" id="field-ssl-port" placeholder="7890" min="1" max="65535"/>
        </html:div>
      </html:div>
    </html:div>

    <!-- SOCKS5: remote DNS option -->
    <html:div class="socks-section" id="socks-section">
      <html:div class="checkbox-row">
        <html:input type="checkbox" id="field-remote-dns" checked="true"/>
        <html:label for="field-remote-dns" data-l10n-id="proxy-field-remote-dns"/>
      </html:div>
    </html:div>

    <html:div class="dialog-actions">
      <html:button id="dialog-cancel" data-l10n-id="proxy-btn-cancel"/>
      <html:button class="primary" id="dialog-save" data-l10n-id="proxy-btn-save"/>
    </html:div>
  </html:div>
</html:div>
